kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
- role: control-plane
  extraPortMappings:
    # gitea http
    - containerPort: 30000
      hostPort: 3000
    # gitea ssh
    - containerPort: 30001
      hostPort: 2222
    # argocd http
    - containerPort: 30010
      hostPort: 3010
    # argocd https
    - containerPort: 30011
      hostPort: 3011

- role: worker
- role: worker
